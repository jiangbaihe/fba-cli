name: Repo Experimental Release

on:
  push:
    tags:
      - "repo-v*"

permissions:
  contents: write

jobs:
  release:
    name: Build GitHub Release Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: bun test

      - name: TypeCheck
        run: pnpm run typecheck

      - name: Check whitespace
        run: git diff --check

      - name: Build
        run: pnpm run build

      - name: Pack
        run: npm pack

      - name: Rename package asset
        shell: bash
        run: |
          set -euo pipefail
          package_file="$(ls fba-cli-*.tgz | head -n 1)"
          test -n "$package_file"
          mv "$package_file" fba-cli.tgz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: fba-cli.tgz
          fail_on_unmatched_files: true
          generate_release_notes: true
